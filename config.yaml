# Lazypipe v3 config
# can include env vars

# GENERAL PARAMETERS
general.parameters:
   #call_R:                   "Rscript --no-save"
   call_R:                   "singularity_wrapper exec Rscript --no-save"
   min_read2hostgen_score:   100     # minimum alignment score for read mapping to hostgen
   min_read2hostgen_mapq:    0
   min_contig2hostgen_score: 300     # minimum alignment score for contig mapping to hostgen
   min_contig_length:        300
   min_orf_length:           72      # minimum ORF length in nucleotides
   min_sans_bits:            200     # minimum alignment score for orf mapping with SANS
   min_hmmscan_bits:         0
   max_hmmscan_eval:         0.01
   min_blastp_bits:          200     # minimum alignment score for orf mapping with BLASTP/X
   min_blastn_bits:          200     # minimum alignment score for contig mapping with blastn
   min_diamond_bits:         200
   min_minimap_DPpeak_score: 200     # minimum alignment score for contig mapping with minimap2
   min_read2contig_score:    80      # minimum alignment score for read mapping to contigs
   min_read2contig_mapq:     0       # minimum alignment quality for read mapping to contigs
   min_psearch_bits_abund:   200     # minimum prot search (eg blastp) bitscore in abundance estimation
   min_nsearch_bits_abund:   200     # minimum nucl search (eg minimap) bitscore in abundance estimation
   min_qcov_abund:           0.50    # minimum query coverage in abundance estimation
   min_qcov_annot:           0.20    # minimum query coverage in annotation reports
   par_trimm:                "ILLUMINACLIP:$TM/adapters/TruSeq3-PE.fa:2:30:10 LEADING:3 TRAILING:3 SLIDINGWINDOW:4:15 MINLEN:36"
   par_fastp:                "-q 15 -u 40 -l 36 --detect_adapter_for_pe --cut_right --cut_window_size 4 --cut_mean_quality 15 --correction"
   refgenrep_min_clen_sum:   1000    # refgen report parameter, minimum contig length sum to report taxon
   refgenrep_min_alen_sum:   0       # refgen report parameter, minimum alignment length sum to report taxon
   refgenrep_max_refgen:     10      # refgen report parameter, maximum number of reference genomes per taxon
   par_megahit:              "--presets meta-sensitive"
   par_spades:               ""
   tail:                     0       # Remove taxa that correspond to this percentile in abundance estimation. Set to zero to keep all predictions.
   tail_contig:              5       # Remove taxa from contig that correspond to this percentile. Reduces noise in abundance estimation.
   taxgroups:                "all"   # taxgroups listed in abund_table.xlsx and annot_table.xlsx. Set to "all" to report all
   toptaxrank:               "division" # can be e.g. "division", "kingdom" or "superkingdom" when using old versions of NCBI taxonomy
   trimm_sample_name:        0       # when setting sample-name to read1-name, trimm sample-name to the first occurance of "_"


# DEFAULT COMMAND LINE OPTIONS
   # input:
#hostgen:            "$hostgenomes/GCA_000001405.15_GRCh38_genomic.fna"
hostgen:            0
hostgen_taxid:      0
   # output:
logs:               "logs"           # logs directory
res:                "$data/results"  # results directory
#tmpdir:             "$data/wrkdir"
tmpdir:             $LOCAL_SCRATCH/wrkdir
tmpdir_keep:        0
   # parameters
pipe:               "main"
pre:                "fastp"     # preprocess: fastp/trimm/none
ass:                "megahit"   # assembler: megahit/spades
ann1:               0
ann2:               0
anns:               0
gen:                "mga"       # gene prediction: mga/prod  (MetaGeneAnnotator/Prodigal)
wmodel:             "bitscore2"  # model for read abundance estimation: taxacount/bitscore/bitscore2
numth:              16
webmode:            0



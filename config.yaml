# ANNOTATION STRATEGIES: call with --anns strategy
ann.strategies:
    # virus only:
    vi.nt:             "--ann1 minimap.nt.vi --ann2 vi:blastn.nt.abv"
    vi.nt.env:         "--ann1 minimap.nt.vi --ann2 vi:blastn.nt"
    vi.nt.fast:        "--ann1 minimap.nt.vi"
    vi.extend:         "--ann1 minimap.nt.vi,sans --ann2 vi:blastn.nt.abv,vi:blastp.uniref100.abv"
    vi.refseq:         "--ann1 minimap.refseq.vi --ann2 vi:blastn.refseq.abv"
    vi.refseq.fast:    "--ann1 minimap.refseq.vi"
    vi.chain1:         "--ann1 minimap.nt.abv,blastn.nt.abv,blastp.uniref100.abv"
    vi.chain2:         "--ann1 minimap.nt.abv,blastp.uniref100.abv"
    vi.chain3:         "--ann1 minimap.nt.abv,diamondp.uniref100.abv"
    vi.chain4:         "--ann1 minimap.nt.abv,sans"
    vi.chain1.env:     "--ann1 minimap.nt,blastn.nt.abv,blastp.uniref100.abv"
    vi.chain3.env:     "--ann1 minimap.nt,diamondp.uniref100.abv"
    chain1.env:    "--ann1 minimap.nt,blastn.nt.abv,blastp.uniref100.abv"
    chain3.env:    "--ann1 minimap.nt,diamondp.uniref100.abv"
    # archaea+bacteria+viruses
    abv.nt:            "--ann1 minimap.nt.abv --ann2 vi:blastn.nt.abv,ab:blastn.nt.abv"
    abv.nt.fast:       "--ann1 minimap.nt.abv"
    abv.extend:        "--ann1 minimap.nt.abv,sans --ann2 vi:blastn.nt.abv,ab:blastn.nt.abv,vi:blastp.uniref100.abv,ab:blastp.uniref100.abv"

